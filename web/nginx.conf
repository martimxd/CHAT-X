map $http_x_forwarded_proto $chatx_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

map $http_host $chatx_host {
  default $http_host;
  "" $host;
}

map $http_x_forwarded_host $chatx_forwarded_host {
  default $http_x_forwarded_host;
  "" $chatx_host;
}

map $http_upgrade $chatx_connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://server:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $chatx_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $chatx_forwarded_host;
    proxy_set_header X-Forwarded-Proto $chatx_forwarded_proto;
  }

  location /socket.io/ {
    proxy_pass http://server:4000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $chatx_connection_upgrade;
    proxy_set_header Host $chatx_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $chatx_forwarded_host;
    proxy_set_header X-Forwarded-Proto $chatx_forwarded_proto;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
